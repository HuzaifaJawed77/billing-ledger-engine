services:
  postgres:
    image: postgres:16-alpine
    container_name: billing-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - billing-network


  redis:
    image: redis:7-alpine
    container_name: billing-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - billing-network


  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: billing-api
    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - .:/app
      - /app/node_modules

    networks:
      - billing-network


volumes:
  postgres_data:
  redis_data:


networks:
  billing-network:
    driver: bridge